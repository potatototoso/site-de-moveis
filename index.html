<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loja de Móveis</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topo">
  <h1>MoveisPro</h1>
  <nav>
    <a href="#">Início</a>
    <a href="#">Produtos</a>
    <a href="#">Contato</a>
  </nav>
</header>

<section class="banner">
  <h2>Móveis modernos para sua casa</h2>
  <p>Qualidade e conforto com os melhores preços</p>
</section>

<section class="produtos">

  <div class="card">
    <img src="https://static.mobly.com.br/p/DDS-SofC3A1-3-Lugares-RetrC3A1til-e-ReclinC3A1vel-Prime-Linho-Cinza-210-cm-1381-5037401-1.jpg">
    <h3>Sofá Luxo</h3>
    <p>R$ 1200</p>
    <button onclick="comprar('Sofá Luxo', 1200)">Comprar</button>
  </div>

  <div class="card">
    <img src="https://storage.panoverse-cdn.com.br/lojadallacosta.img/produto/550/mesa-para-escritorio-industrial-f20-off-white-freijo-dalla-costa-3697-large.jpg">
    <h3>Mesa Premium</h3>
    <p>R$ 800</p>
    <button onclick="comprar('Mesa Premium', 800)">Comprar</button>
  </div>

  <div class="card">
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRYw30OCPj03wdnp8-s5i1RhDcj3t55pMooBg&s">
    <h3>Cadeira Confort</h3>
    <p>R$ 300</p>
    <button onclick="comprar('Cadeira Confort', 300)">Comprar</button>
  </div>

</section>

<footer>
  <p>© 2026 MoveisPro - Todos os direitos reservados</p>
</footer>

</body><script>
function comprar(nome, preco){
  localStorage.setItem("produto", nome);
  localStorage.setItem("preco", preco);
  window.location.href = "compra.html";
}
</script>
</html>
